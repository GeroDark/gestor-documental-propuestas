{% extends "base.html" %}

{% block title %}Mi perfil{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-4">Mi perfil</h1>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-dark">
                        Guardar cambios
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
