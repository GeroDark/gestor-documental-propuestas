{% extends "base.html" %}

{% block title %}Eliminar cliente{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h1 class="h4 mb-3">Eliminar cliente</h1>
                <p>
                    ¿Seguro que deseas eliminar a <strong>{{ client.business_name }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        <a href="{% url 'client-detail' client.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
